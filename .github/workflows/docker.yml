name: Docker Build & Deploy for Nuvio

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4
      
      - name: Nuvio manifest.json oluştur
        run: |
          mkdir -p static
          cat > static/manifest.json << 'EOF'
          {
            "id": "org.nuvio.stremioporn",
            "version": "0.0.4",
            "name": "Stremio Porn",
            "description": "Adult content addon for Nuvio",
            "types": ["movie", "series"],
            "catalogs": [
              {
                "type": "movie",
                "id": "stremioporn",
                "name": "Adult Videos",
                "genres": ["Adult"],
                "extra": [
                  {
                    "name": "search",
                    "isRequired": false
                  },
                  {
                    "name": "genre",
                    "isRequired": false
                  },
                  {
                    "name": "skip",
                    "isRequired": false
                  }
                ]
              }
            ],
            "resources": ["catalog", "stream", "meta"],
            "idPrefixes": ["tt", "stremio_porn"],
            "logo": "https://raw.githubusercontent.com/${{ github.repository }}/master/static/logo.png",
            "icon": "https://raw.githubusercontent.com/${{ github.repository }}/master/static/icon.png",
            "background": "https://raw.githubusercontent.com/${{ github.repository }}/master/static/background.jpg",
            "behaviorHints": {
              "adult": true,
              "configurable": false,
              "configurationRequired": false
            }
          }
          EOF
          echo "✅ Nuvio manifest.json oluşturuldu"
          cat static/manifest.json
      
      - name: Dockerfile oluştur
        run: |
          cat > Dockerfile << 'EOF'
          FROM node:18-alpine
          WORKDIR /app
          
          # Sistem bağımlılıkları
          RUN apk add --no-cache python3 make g++
          
          # Node bağımlılıkları
          COPY package*.json ./
          RUN npm install --production
          
          # Uygulama dosyaları
          COPY dist/ ./dist/
          COPY static/ ./static/
          
          # Port ve çevre
          EXPOSE 80
          ENV NODE_ENV=production
          ENV STREMIO_PORN_PORT=80
          
          # Sağlık kontrolü
          HEALTHCHECK --interval=30s --timeout=3s --start-period=5s --retries=3 \
            CMD node -e "require('http').get('http://localhost:80/manifest.json', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"
          
          CMD ["node", "dist/index.js"]
          EOF
          echo "✅ Dockerfile oluşturuldu"
      
      - name: .dockerignore oluştur
        run: |
          cat > .dockerignore << 'EOF'
          .git
          .github
          node_modules
          npm-debug.log
          .env
          .vscode
          .idea
          coverage
          *.log
          src
          tests
          .eslintrc.json
          .babelrc
          README.md
          Dockerfile
          .dockerignore
          EOF
          echo "✅ .dockerignore oluşturuldu"
      
      - name: Dosyaları kontrol et
        run: |
          echo "=== dist/ içeriği ==="
          ls -la dist/ 2>/dev/null || echo "❌ dist yok!"
          echo ""
          echo "=== static/ içeriği ==="
          ls -la static/ 2>/dev/null || echo "❌ static yok!"
          echo ""
          echo "=== package.json ==="
          head -20 package.json
      
      - name: GHCR'ye giriş yap
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Docker imajını build et ve push et
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stremio-porn:latest
            ghcr.io/${{ github.repository_owner }}/stremio-porn:nuvio
      
      - name: Nuvio kullanım bilgisi
        run: |
          echo "✅ Nuvio için build tamamlandı!"
          echo ""
          echo "📦 İndirmek için:"
          echo "docker pull ghcr.io/${{ github.repository_owner }}/stremio-porn:nuvio"
          echo ""
          echo "🚀 Nuvio'da kullanmak için:"
          echo "1. Docker imajını çalıştır:"
          echo "   docker run -d -p 80:80 --name nuvio-addon ghcr.io/${{ github.repository_owner }}/stremio-porn:nuvio"
          echo ""
          echo "2. Nuvio'ya ekle:"
          echo "   URL: http://SUNUCU-IP:80/manifest.json"
          echo ""
          echo "3. Manifest kontrol:"
          echo "   curl http://localhost:80/manifest.json"
