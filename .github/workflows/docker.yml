name: Docker Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4
      
      - name: Dockerfile oluştur
        run: |
          cat > Dockerfile << 'EOF'
          FROM node:14-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm install --production
          COPY dist/ ./dist/
          COPY static/ ./static/
          EXPOSE 80
          CMD ["node", "dist/index.js"]
          EOF
          echo "✅ Dockerfile oluşturuldu"
      
      - name: .dockerignore oluştur
        run: |
          cat > .dockerignore << 'EOF'
          .git
          .github
          node_modules
          npm-debug.log
          .env
          .vscode
          .idea
          coverage
          *.log
          EOF
          echo "✅ .dockerignore oluşturuldu"
      
      - name: Dosyaları kontrol et
        run: |
          echo "=== Dockerfile ==="
          cat Dockerfile
          echo ""
          echo "=== .dockerignore ==="
          cat .dockerignore
          echo ""
          echo "=== dist/ var mı? ==="
          ls -la dist/ || echo "❌ dist yok!"
          echo ""
          echo "=== static/ var mı? ==="
          ls -la static/ || echo "❌ static yok!"
      
      - name: GHCR'ye giriş yap
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Docker imajını build et ve push et
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/stremio-porn:latest
      
      - name: Başarı mesajı
        run: |
          echo "✅ Build tamamlandı!"
          echo "İndirmek için:"
          echo "docker pull ghcr.io/${{ github.repository_owner }}/stremio-porn:latest"
