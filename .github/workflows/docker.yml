name: Docker Build & Deploy for Nuvio

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4
      
      - name: Klasör yapısını kontrol et
        run: |
          echo "=== ROOT ==="
          ls -la
          echo ""
          echo "=== DIST ==="
          ls -la dist/
          echo ""
          echo "=== STATIC ==="
          ls -la static/ 2>/dev/null || echo "static yok, oluşturulacak"
      
      - name: static/manifest.json oluştur (Nuvio için)
        run: |
          mkdir -p static
          cat > static/manifest.json << 'EOF'
          {
            "id": "org.nuvio.stremioporn",
            "version": "0.0.4",
            "name": "Stremio Porn",
            "description": "Adult content addon for Nuvio",
            "types": ["movie", "series"],
            "catalogs": [
              {
                "type": "movie",
                "id": "stremioporn",
                "name": "Adult Videos",
                "genres": ["Adult"],
                "extra": [
                  {"name": "search", "isRequired": false},
                  {"name": "genre", "isRequired": false},
                  {"name": "skip", "isRequired": false}
                ]
              }
            ],
            "resources": ["catalog", "stream", "meta"],
            "idPrefixes": ["tt", "stremio_porn"],
            "logo": "https://raw.githubusercontent.com/${{ github.repository }}/master/static/logo.png",
            "icon": "https://raw.githubusercontent.com/${{ github.repository }}/master/static/icon.png",
            "background": "https://raw.githubusercontent.com/${{ github.repository }}/master/static/background.jpg",
            "behaviorHints": {
              "adult": true,
              "configurable": false,
              "configurationRequired": false
            }
          }
          EOF
          echo "✅ manifest.json oluşturuldu"
      
      - name: .dockerignore oluştur
        run: |
          cat > .dockerignore << 'EOF'
          .git
          .github
          node_modules
          npm-debug.log
          yarn-error.log
          .env
          .env.*
          .vscode
          .idea
          coverage
          *.log
          logs
          tmp
          temp
          src
          tests
          .eslintrc.json
          .babelrc
          README.md
          Dockerfile
          .dockerignore
          yarn.lock
          EOF
      
      - name: Dockerfile oluştur
        run: |
          cat > Dockerfile << 'EOF'
          FROM node:alpine
          WORKDIR /var/stremio_addon
          COPY package.json yarn.lock ./
          RUN yarn install --production --frozen-lockfile
          COPY dist/ ./dist/
          COPY static/ ./static/
          EXPOSE 80
          ENV NODE_ENV=production
          CMD ["node", "dist/index.js"]
          EOF
      
      - name: GHCR'ye giriş yap
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Docker imajını build et ve push et
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/stremio-porn:nuvio
      
      - name: Başarı mesajı
        run: |
          echo "✅ Build tamamlandı!"
          echo ""
          echo "📦 İndirmek için:"
          echo "docker pull ghcr.io/${{ github.repository_owner }}/stremio-porn:nuvio"
          echo ""
          echo "🚀 Çalıştırmak için:"
          echo "docker run -d -p 80:80 --name nuvio-addon ghcr.io/${{ github.repository_owner }}/stremio-porn:nuvio"
          echo ""
          echo "🔗 Nuvio'ya ekle:"
          echo "http://SUNUCU-IP:80/manifest.json"
