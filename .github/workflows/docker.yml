name: Deploy Nuvio Addon to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Bağımlılıkları Kur ve Derle
        run: |
          yarn install --frozen-lockfile
          yarn run build || echo "Build adımı yoksa atlanıyor..."

      - name: Yayın klasörünü hazırla (public)
        run: |
          mkdir -p public
          # Derlenmiş dosyaları public içine kopyala
          cp -r dist/* public/ 2>/dev/null || cp -r . public/
          cp -r static public/ 2>/dev/null || mkdir -p public/static
          
          # manifest.json dosyasını public içinde oluştur
          cat > public/manifest.json << 'EOF'
          {
            "id": "org.nuvio.stremioporn",
            "version": "0.0.4",
            "name": "Stremio Porn",
            "description": "Adult content addon for Nuvio",
            "types": ["movie", "series"],
            "catalogs": [
              {
                "type": "movie",
                "id": "stremioporn",
                "name": "Adult Videos",
                "genres": ["Adult"],
                "extra": [
                  {"name": "search", "isRequired": false},
                  {"name": "genre", "isRequired": false},
                  {"name": "skip", "isRequired": false}
                ]
              }
            ],
            "resources": ["catalog", "stream", "meta"],
            "idPrefixes": ["tt", "stremio_porn"],
            "logo": "https://raw.githubusercontent.com/${{ github.repository }}/master/static/logo.png",
            "icon": "https://raw.githubusercontent.com/${{ github.repository }}/master/static/icon.png",
            "background": "https://raw.githubusercontent.com/${{ github.repository }}/master/static/background.jpg",
            "behaviorHints": {
              "adult": true,
              "configurable": false,
              "configurationRequired": false
            }
          }
          EOF
          echo "✅ manifest.json public klasörüne yazıldı."

      - name: GitHub Pages'a Yükle
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public # Sadece bu klasördeki dosyalar yayınlanacak
          branch: gh-pages # Bu dal üzerinden yayın yapılacak
